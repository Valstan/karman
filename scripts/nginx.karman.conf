# Референс-конфиг nginx для KARMAN (единый Next.js на 127.0.0.1:3000).
# Заменяет старую схему (статика frontend_dist/ + проксирование /api → :8080).
# TLS-блок (listen 443) обычно дописывает certbot автоматически.
server {
    listen 80;
    server_name _;

    # Единый проксипас на Next.js. /api/health и все страницы — один процесс.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ВАЖНО: нужно для Secure-cookie и определения протокола в Next.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
